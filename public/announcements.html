<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Announcements — MII VLE</title>
  <link rel="stylesheet" href="MII.css" />
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <div class="topbar-brand"><span class="badge">☪</span> MII VLE</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <span class="topbar-name" id="topbarName"></span>
      <div class="topbar-avatar" id="topbarAvatar" onclick="location.href='profile.html'"><span id="topbarInitials">?</span></div>
      <button class="icon-btn" onclick="location.href='/auth/logout'">⏻</button>
    </div>
  </header>
  <nav class="sidebar">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="student-dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
    <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> My Courses</a>
    <a class="nav-item" href="assignments.html"><span class="nav-icon">📝</span> Assignments</a>
    <a class="nav-item" href="calendar.html"><span class="nav-icon">📅</span> Calendar</a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">Learning</div>
    <a class="nav-item" href="grades.html"><span class="nav-icon">📊</span> Grades</a>
    <a class="nav-item" href="progress.html"><span class="nav-icon">📈</span> Progress</a>
    <a class="nav-item active" href="announcements.html"><span class="nav-icon">📣</span> Announcements</a>
    <a class="nav-item" href="people.html"><span class="nav-icon">👥</span> People</a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">Account</div>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
    <a class="nav-item" href="/auth/logout"><span class="nav-icon">⏻</span> Sign Out</a>
  </nav>
  <main class="main">
    <div class="page-header">
      <h1>Announcements</h1>
      <p>Important notices from your teachers and administration</p>
    </div>
    <div class="card">
      <div id="announcementList"><div class="text-muted text-xs">Loading…</div></div>
    </div>
  </main>
</div>

<script>
async function init() {
  const res = await fetch('/api/me');
  if (!res.ok) { location.href='/'; return; }
  const user = await res.json();
  const name = user.name||'';
  document.getElementById('topbarName').textContent = name;
  document.getElementById('topbarInitials').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  if (user.profilePicture) document.getElementById('topbarAvatar').innerHTML=`<img src="${user.profilePicture}" alt="${name}">`;

  const r = await fetch('/api/announcements');
  const el = document.getElementById('announcementList');
  if (!r.ok) { el.innerHTML='<div class="text-muted text-xs">Failed to load.</div>'; return; }
  const arr = await r.json();
  if (!arr.length) { el.innerHTML='<div class="text-muted text-xs">No announcements yet.</div>'; return; }
  el.innerHTML = arr.map(a=>`
    <div class="announcement-item">
      <div class="flex justify-between items-center mb-1">
        <div class="ann-title">${a.title}</div>
        <span class="badge ${a.isGlobal?'badge-blue':'badge-green'}">${a.isGlobal?'Global':'Course'}</span>
      </div>
      <div class="ann-meta">
        By <b style="color:var(--text)">${a.author?.name||'MII'}</b> · ${new Date(a.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}
      </div>
      <div class="ann-body">${a.content}</div>
    </div>`).join('');
}
init();
</script>
</body>
</html>

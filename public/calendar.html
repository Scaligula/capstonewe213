<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendar — MII VLE</title>
  <link rel="stylesheet" href="MII.css" />
  <style>
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day-header { font-size: 0.68rem; font-weight: 700; color: var(--text-dim); text-align: center; padding: 0.3rem 0; text-transform: uppercase; }
    .cal-day {
      min-height: 72px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.35rem 0.4rem; cursor: default;
      transition: background 0.15s;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.other-month { opacity: 0.3; }
    .cal-day.today { border-color: var(--green); }
    .cal-day-num { font-size: 0.76rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.2rem; }
    .cal-day.today .cal-day-num { color: #7ec87e; }
    .cal-event-chip {
      font-size: 0.62rem; padding: 0.1rem 0.3rem; border-radius: 3px;
      margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block;
    }
    .chip-green { background: rgba(31,122,31,0.25); color: #7ec87e; }
    .chip-yellow { background: rgba(180,140,0,0.2); color: #c8b030; }
    .chip-red { background: rgba(180,50,50,0.2); color: #e08080; }
    .chip-blue { background: rgba(50,100,180,0.18); color: #80aaee; }
    .cal-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .cal-nav h2 { font-size: 1rem; font-weight: 700; flex: 1; }
    .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.74rem; color: var(--text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <div class="topbar-brand"><span class="badge">☪</span> MII VLE</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <span class="topbar-name" id="topbarName"></span>
      <div class="topbar-avatar" id="topbarAvatar" onclick="location.href='profile.html'"><span id="topbarInitials">?</span></div>
      <button class="icon-btn" onclick="location.href='/auth/logout'">⏻</button>
    </div>
  </header>
  <nav class="sidebar">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="student-dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
    <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> My Courses</a>
    <a class="nav-item" href="assignments.html"><span class="nav-icon">📝</span> Assignments</a>
    <a class="nav-item active" href="calendar.html"><span class="nav-icon">📅</span> Calendar</a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">Learning</div>
    <a class="nav-item" href="grades.html"><span class="nav-icon">📊</span> Grades</a>
    <a class="nav-item" href="progress.html"><span class="nav-icon">📈</span> Progress</a>
    <a class="nav-item" href="announcements.html"><span class="nav-icon">📣</span> Announcements</a>
    <a class="nav-item" href="people.html"><span class="nav-icon">👥</span> People</a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">Account</div>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    <a class="nav-item" href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
    <a class="nav-item" href="/auth/logout"><span class="nav-icon">⏻</span> Sign Out</a>
  </nav>
  <main class="main">
    <div class="page-header">
      <h1>Calendar</h1>
      <p>Deadlines, assignment dates, and important events</p>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2d9e2d"></div> Assignment Start</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b88c00"></div> Deadline</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b83232"></div> Overdue</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3264b8"></div> Announcement</div>
    </div>
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(-1)">‹</button>
        <h2 id="calTitle"></h2>
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(1)">›</button>
        <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </main>
</div>

<script>
let viewYear, viewMonth, events = [];
const today = new Date();

function sameDay(a, b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function renderCalendar() {
  const title = new Date(viewYear, viewMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('calTitle').textContent = title;
  const grid = document.getElementById('calGrid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  for (let i=firstDay-1;i>=0;i--) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;
  }
  for (let d=1;d<=daysInMonth;d++) {
    const date = new Date(viewYear, viewMonth, d);
    const isToday = sameDay(date, today);
    const dayEvents = events.filter(e=>sameDay(new Date(e.date), date));
    const chips = dayEvents.map(e=>`<span class="cal-event-chip chip-${e.type}" title="${e.label}">${e.label}</span>`).join('');
    html += `<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  const remaining = 42 - firstDay - daysInMonth;
  for (let d=1;d<=remaining;d++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }
  grid.innerHTML = html;
}

function changeMonth(delta) { viewMonth+=delta; if(viewMonth>11){viewMonth=0;viewYear++;}else if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); }
function goToday() { viewYear=today.getFullYear(); viewMonth=today.getMonth(); renderCalendar(); }

async function init() {
  viewYear = today.getFullYear(); viewMonth = today.getMonth();
  const meRes = await fetch('/api/me');
  if (!meRes.ok) { location.href='/'; return; }
  const user = await meRes.json();
  const name = user.name||'';
  document.getElementById('topbarName').textContent = name;
  document.getElementById('topbarInitials').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  if (user.profilePicture) document.getElementById('topbarAvatar').innerHTML=`<img src="${user.profilePicture}" alt="${name}">`;

  // Gather events
  for (const cid of (user.enrolledCourses||[])) {
    const ar = await fetch(`/api/course/${cid}/assignments`); if (!ar.ok) continue;
    const asgns = await ar.json();
    asgns.forEach(a=>{
      const dueDate = new Date(a.dueDate);
      const isOverdue = dueDate < today;
      events.push({ date: a.startDate, label: '▶ '+a.title.slice(0,18), type:'green' });
      events.push({ date: a.dueDate, label: '⏰ '+a.title.slice(0,18), type: isOverdue?'red':'yellow' });
    });
  }
  const annRes = await fetch('/api/announcements');
  if (annRes.ok) {
    const anns = await annRes.json();
    anns.forEach(a=>events.push({ date: a.createdAt, label: '📣 '+a.title.slice(0,18), type:'blue' }));
  }
  renderCalendar();
}
init();
</script>
</body>
</html>
